<div class="p-6 space-y-10">
  <!-- Title -->
  <h1 class="text-2xl font-semibold">Icon Component</h1>

  <!-- ===================== -->
  <!-- Available Icons -->
  <!-- ===================== -->
  <section>
    <h2 class="text-lg font-medium mb-4">Available Icons</h2>

    <div class="flex flex-wrap gap-6">
      @for (icon of icons; track icon) {
        <div
          class="w-full md:w-[calc((100%-3rem)/3)] rounded-lg p-6 flex flex-col items-center gap-3 bg-gray-50 hover:bg-gray-100 transition-all duration-200 cursor-pointer"
        >
          <app-icon [name]="icon" size="m"></app-icon>
          <span class="text-gray-600">{{ icon }}</span>
        </div>
      }
    </div>
  </section>

  <!-- ===================== -->
  <!-- Icon Sizes -->
  <!-- ===================== -->
  <section>
    <h2 class="text-lg font-medium mb-4">Icon Sizes</h2>
    <div class="flex flex-wrap gap-6">
      <div
        class="w-full md:w-[calc((100%-3rem)/3)] rounded-lg p-6 flex flex-col items-center gap-3 bg-gray-50 hover:bg-gray-100 transition-all duration-200 cursor-pointer"
      >
        <app-icon name="house" size="s"></app-icon>
        <span>Small (8px)</span>
      </div>

      <div
        class="w-full md:w-[calc((100%-3rem)/3)] rounded-lg p-6 flex flex-col items-center gap-3 bg-gray-50 hover:bg-gray-100 transition-all duration-200 cursor-pointer"
      >
        <app-icon name="house" size="m"></app-icon>
        <span>Medium (16px)</span>
      </div>

      <div
        class="w-full md:w-[calc((100%-3rem)/3)] rounded-lg p-6 flex flex-col items-center gap-3 bg-gray-50 hover:bg-gray-100 transition-all duration-200 cursor-pointer"
      >
        <app-icon name="house" size="l"></app-icon>
        <span>Large (24px)</span>
      </div>
    </div>
  </section>

  <!-- ===================== -->
  <!-- Colors -->
  <!-- ===================== -->
  <section>
    <h2 class="text-lg font-medium mb-4">Colors</h2>

    <div class="flex gap-6 items-center">
      <app-icon name="house" class="text-black"></app-icon>
      <app-icon name="house" class="text-blue-500"></app-icon>
      <app-icon name="house" class="text-red-500"></app-icon>

      <div class="bg-black p-2 rounded">
        <app-icon name="house" class="text-white"></app-icon>
      </div>
    </div>
  </section>
</div>

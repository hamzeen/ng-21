<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow">
  <h2 class="text-xl font-bold mb-4">Signal Computed Demo</h2>
  <ul class="mb-4">
    @for (item of items(); track $index) {
      <li class="flex justify-between py-1">
        <span>{{ item.name }}</span>
        <span>${{ item.price }}</span>
      </li>
    }
  </ul>
  <div class="mb-2">
    <span class="font-medium">Tax Rate:</span>
    <input
      type="number"
      min="0"
      max="1"
      step="0.01"
      [value]="taxRate()"
      (input)="setTaxRate($event.target.value)"
      class="border rounded px-2 py-1 w-20 ml-2"
    />
  </div>
  <div class="mt-4 text-lg font-semibold">Total (with tax): ${{ total() | number: '1.2-2' }}</div>
</div>

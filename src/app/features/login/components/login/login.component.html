<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md text-center">
    <!-- icon -->
    <div class="flex justify-center mb-6">
      <div class="flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
        <i class="fa-solid fa-user text-green-600 text-xl"></i>
      </div>
    </div>

    <!-- title -->
    <h2 class="text-3xl font-semibold text-gray-900 mb-6">Login</h2>

    <!-- form -->
    <form [formGroup]="form()" (ngSubmit)="login()">
      <!-- username input -->
      <input
        #nameInput
        formControlName="name"
        placeholder="Enter username"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 mb-2"
      />

      <!-- validation -->
      @if (form().controls.name.touched && form().controls.name.invalid) {
        <p class="text-sm text-red-500 mb-4">Name is required</p>
      }

      <!-- login button -->
      <button
        type="submit"
        class="w-full rounded-xl bg-blue-600 py-4 text-lg font-medium text-white transition hover:bg-blue-700 disabled:bg-gray-400"
        [disabled]="form().invalid"
      >
        Confirm
      </button>
    </form>
  </div>
</div>

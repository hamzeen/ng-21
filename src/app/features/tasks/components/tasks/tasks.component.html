<div class="tasks-page">
  <section class="tasks-app" aria-labelledby="tasks-title">
    <header class="tasks-header">
      <p class="tasks-greeting">Hi, {{ sessionStore.user()?.name }}</p>
      <h1 id="tasks-title" class="tasks-title">What do you want to do?</h1>
    </header>

    <section class="tasks-summary" aria-label="Todo summary">
      <div class="tasks-summary__icon">
        <i class="fa-solid fa-list-check" aria-hidden="true"></i>
      </div>

      <div class="tasks-summary__content">
        <div class="tasks-summary__title">Todo summary</div>
        <div class="tasks-summary__meta">
          {{ completedCount() }} completed · {{ pendingCount() }} pending · {{ totalCount() }} total
        </div>

        <div class="tasks-progress" aria-hidden="true">
          <div class="tasks-progress__bar" [style.width.%]="completionPercent()"></div>
        </div>
      </div>
    </section>

    <section class="tasks-list-section" aria-labelledby="tasks-list-title">
      <div class="tasks-section-header">
        <h2 id="tasks-list-title">Your tasks</h2>
        <span>{{ pendingCount() }} pending</span>
      </div>

      <ul class="tasks-list">
        @for (todo of todos(); track $index) {
          <li class="tasks-item" [class.tasks-item--completed]="todo.completed">
            <button
              type="button"
              class="tasks-status-button"
              (click)="toggleTodo($index)"
              [attr.aria-label]="todo.completed ? 'Mark task as pending' : 'Mark task as done'"
            >
              <i
                [class]="todo.completed ? 'fa-solid fa-check' : 'fa-regular fa-circle'"
                aria-hidden="true"
              ></i>
            </button>

            <span class="tasks-item__text" title="{{ todo.text }}">
              {{ todo.text }}
            </span>

            <button
              type="button"
              class="tasks-remove-button"
              (click)="removeTodo($index)"
              aria-label="Remove task"
            >
              <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
          </li>
        }
      </ul>
    </section>

    <form
      class="tasks-add-form"
      (submit)="addTodo(newTodo.value); newTodo.value = ''; $event.preventDefault()"
    >
      <input
        #newTodo
        class="ds-input tasks-add-input"
        type="text"
        placeholder="Add a new task..."
        aria-label="New task"
      />

      <ds-button type="submit" variant="primary" size="lg" [iconOnly]="true" ariaLabel="Add task">
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
      </ds-button>
    </form>
  </section>
</div>

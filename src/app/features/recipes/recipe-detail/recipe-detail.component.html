<div class="h-screen overflow-y-auto px-8">
  <div
    *ngIf="recipe"
    class="rounded-2xl bg-white shadow-xl overflow-hidden flex flex-col max-w-2xl mx-auto my-6"
  >
    <img [src]="recipe.image" [alt]="recipe.title" class="h-64 w-full object-cover" />

    <div class="p-6 flex flex-col gap-4 pb-8">
      <button
        (click)="goBack()"
        class="text-sm text-blue-500 hover:text-blue-700 font-semibold flex items-center gap-1 w-fit"
      >
        ← Back to Recipes
      </button>

      <h2 class="text-3xl font-bold text-[#335B63]">{{ recipe.title }}</h2>
      <p class="text-gray-600 text-base">{{ recipe.description }}</p>

      <div class="flex items-center gap-2 text-[#335B63]/80">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 text-[#61C3AD]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2" />
          <circle cx="12" cy="12" r="10" />
        </svg>
        <span class="font-semibold">{{ recipe.time }} minutes</span>
      </div>

      <div class="border-t border-gray-200 pt-4">
        <h3 class="font-semibold text-lg text-[#335B63] mb-3">Ingredients</h3>
        <ul class="list-disc ml-6 text-base space-y-2">
          <li *ngFor="let ingredient of recipe.ingredients" class="text-gray-700">
            {{ ingredient }}
          </li>
        </ul>
      </div>

      <div class="border-t border-gray-200 pt-4">
        <h3 class="font-semibold text-lg text-[#335B63] mb-3">Steps</h3>
        <ol class="list-decimal ml-6 text-base space-y-2">
          <li *ngFor="let step of recipe.steps" class="text-gray-700">
            {{ step }}
          </li>
        </ol>
      </div>
    </div>
  </div>
</div>

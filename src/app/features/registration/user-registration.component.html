<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow">
  <h2 class="text-xl font-bold mb-4">User Registration</h2>
  <form [formGroup]="form()" (ngSubmit)="submit()">
    <div class="mb-4">
      <label class="block mb-1 font-medium">Name</label>
      <input
        formControlName="name"
        class="w-full border rounded px-3 py-2"
        placeholder="Enter your name"
      />
      <div *ngIf="name?.invalid && name?.touched" class="text-red-500 text-sm mt-1">
        <span *ngIf="name?.errors?.['required']">Name is required.</span>
        <span *ngIf="name?.errors?.['minlength']">Name must be at least 2 characters.</span>
      </div>
    </div>
    <div class="mb-4">
      <label class="block mb-1 font-medium">Email</label>
      <input
        formControlName="email"
        class="w-full border rounded px-3 py-2"
        placeholder="Enter your email"
      />
      <div *ngIf="email?.invalid && email?.touched" class="text-red-500 text-sm mt-1">
        <span *ngIf="email?.errors?.['required']">Email is required.</span>
        <span *ngIf="email?.errors?.['email']">Invalid email address.</span>
      </div>
    </div>
    <div class="mb-4">
      <label class="block mb-1 font-medium">Password</label>
      <input
        formControlName="password"
        type="password"
        class="w-full border rounded px-3 py-2"
        placeholder="Enter your password"
      />
      <div *ngIf="password?.invalid && password?.touched" class="text-red-500 text-sm mt-1">
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>
    </div>
    <button
      type="submit"
      class="bg-blue-600 text-white px-4 py-2 rounded font-semibold"
      [disabled]="!form().valid"
    >
      Register
    </button>
  </form>
  <div class="mt-6">
    <h3 class="font-medium mb-2">Form State:</h3>
    <pre class="bg-gray-100 p-2 rounded text-xs">{{ formState() | json }}</pre>
  </div>
</div>

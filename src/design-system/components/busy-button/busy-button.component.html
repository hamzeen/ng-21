<button
  class="busy-btn"
  [class]="hostClasses.join(' ')"
  [attr.aria-busy]="isLoading"
  [attr.aria-disabled]="isDisabled"
  [attr.aria-label]="isLoading ? loadingLabel : label"
  [disabled]="isDisabled"
  (click)="handleClick()"
>
  <span class="busy-btn__inner">
    <span class="busy-btn__spinner" aria-hidden="true" *ngIf="isLoading">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-dasharray="40" stroke-dashoffset="30" />
      </svg>
    </span>

    <span class="busy-btn__label">
      {{ isLoading ? loadingLabel : label }}
    </span>
  </span>
</button>
